<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo – En partie !</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

    <!-- Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Loading state -->
    <div class="wrapper">
        <div id="pageLoader" class="page-loading">
            <div class="big-loader"></div>
            <p>Chargement de la partie...</p>
        </div>

        <div id="gameContainer" style="display:none">
            <!-- Header -->
            <header>
                <div class="logo">
                    <i class="fa-solid fa-grip"></i>
                    <h1>Bingo<span>Online</span></h1>
                </div>
                <div class="auth-area" id="authArea"></div>
            </header>

            <!-- Status bar -->
            <div class="game-status-bar">
                <a href="index.html" class="back-link" style="margin:0" onclick="return confirmLeave()">
                    <i class="fa-solid fa-arrow-left"></i> Quitter
                </a>
                <div class="room-info">
                    Room : <span id="statusRoomCode">---</span>
                    &nbsp;·&nbsp; Numéros tirés : <span id="statusCount">0</span>/75
                </div>
                <div>
                    <button class="btn btn-primary" id="btnDraw" onclick="drawNumber()"
                        style="display:none; padding:10px 20px; font-size:0.9rem;">
                        <i class="fa-solid fa-dice"></i> Tirer un numéro
                    </button>
                </div>
            </div>

            <!-- Game layout -->
            <div class="game-layout">

                <!-- Bingo board -->
                <div class="bingo-section">
                    <div class="bingo-header-row">
                        <div class="bingo-letter">B</div>
                        <div class="bingo-letter">I</div>
                        <div class="bingo-letter">N</div>
                        <div class="bingo-letter">G</div>
                        <div class="bingo-letter">O</div>
                    </div>
                    <div class="bingo-grid" id="bingoGrid"></div>
                    <div style="margin-top:12px; text-align:center;">
                        <button class="btn btn-success" id="btnBingo" onclick="claimBingo()" style="display:none">
                            🎉 BINGO !
                        </button>
                    </div>
                </div>

                <!-- Sidebar -->
                <div class="sidebar">
                    <!-- Last drawn number -->
                    <div class="sidebar-panel">
                        <h3><i class="fa-solid fa-circle-dot"></i> Dernier numéro</h3>
                        <div class="current-number" id="currentNumber">–</div>
                        <div class="current-category" id="currentCategory"></div>
                    </div>

                    <!-- Draw button (for host) -->
                    <div class="sidebar-panel" id="hostPanel" style="display:none">
                        <h3><i class="fa-solid fa-crown"></i> Contrôles hôte</h3>
                        <button class="btn btn-primary" id="btnDrawSidebar" onclick="drawNumber()" style="width:100%;">
                            <i class="fa-solid fa-dice"></i> Tirer un numéro
                        </button>
                    </div>

                    <!-- Called numbers -->
                    <div class="sidebar-panel">
                        <h3><i class="fa-solid fa-list"></i> Numéros tirés</h3>
                        <div class="called-numbers-list" id="calledList"></div>
                    </div>

                    <!-- Players -->
                    <div class="sidebar-panel">
                        <h3><i class="fa-solid fa-users"></i> Joueurs</h3>
                        <div class="players-status" id="playersStatus"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Winner overlay -->
    <div id="winner-overlay">
        <div class="winner-card">
            <div class="trophy">🏆</div>
            <h2 id="winnerTitle">BINGO !</h2>
            <p id="winnerSubtitle">Un joueur a gagné !</p>
            <div class="winner-actions">
                <a href="index.html" class="btn btn-primary">
                    <i class="fa-solid fa-house"></i> Nouveau jeu
                </a>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script src="game.js"></script>
</body>

</html>
